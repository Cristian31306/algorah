<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorah | Ingeniería de Software de Élite para Negocios Escalables</title>
    <meta name="description" content="Diseñamos y construimos software a medida con arquitectura escalable. No somos una agencia más, somos tus socios tecnológicos.">
    
    <!-- Open Graph / Redes Sociales y WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://algorah.bond/" />
    <meta property="og:title" content="Algorah | Ingeniería de Software de Élite" />
    <meta property="og:description" content="Diseñamos y construimos software a medida con arquitectura escalable. No somos una agencia más, somos tus socios tecnológicos." />
    <!-- Sugerencia: Agrega una imagen en public/og-image.jpg para que salga al enviar el link -->
    <meta property="og:image" content="https://algorah.bond/og-image.jpg" />

    <!-- Datos Estructurados (Schema.org) para Google e Inteligencias Artificiales -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Algorah",
      "url": "https://algorah.bond/",
      "description": "Empresa de ingeniería de software dedicada al diseño y desarrollo de aplicaciones web, móviles y arquitecturas escalables a medida para negocios.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "provider": {
        "@type": "Organization",
        "name": "Algorah",
        "url": "https://algorah.bond/",
        "logo": "https://algorah.bond/assets/favicon.ico",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "info@algorah.bond",
          "contactType": "customer service"
        }
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      async function trackVisit() {
        let loc = 'Desconocida';
        let ipInfo = 'Oculta';
        try {
          const res = await fetch('https://get.geojs.io/v1/ip/geo.json');
          const geo = await res.json();
          loc = `${geo.city || 'Ciudad Desconocida'}, ${geo.country || ''}`;
          ipInfo = geo.ip || 'Oculta';
        } catch (e) {}

        fetch('/api/notify-visit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ page: 'Algorah Landing Page', location: loc, ip: ipInfo })
        }).catch(e => console.error(e));
      }
      trackVisit();
    </script>
  </body>
</html>
